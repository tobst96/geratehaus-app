<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<style>
    @page {
        size: A4;
        margin: 2.2cm 1.8cm 2cm 1.8cm;
        @bottom-center {
            content: "Seite " counter(page) " von " counter(pages) " — erstellt mit Gerätehaus.app";
            font-size: 8pt;
            color: #666;
        }
    }
    body {
        font-family: "DejaVu Sans", Helvetica, Arial, sans-serif;
        font-size: 11pt;
        color: #1a1a1a;
    }
    header.dokument-kopf {
        display: flex;
        align-items: center;
        gap: 16px;
        border-bottom: 3px solid {{ farbe_primaer }};
        padding-bottom: 12px;
        margin-bottom: 24px;
    }
    header.dokument-kopf img {
        height: 48px;
        max-width: 120px;
        object-fit: contain;
    }
    header.dokument-kopf .organisation {
        font-size: 14pt;
        font-weight: bold;
        color: {{ farbe_primaer }};
    }
    h1 {
        font-size: 16pt;
        margin-bottom: 4px;
    }
    .meta {
        color: #555;
        font-size: 9.5pt;
        margin-bottom: 18px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 6px 8px;
        text-align: left;
        font-size: 9.5pt;
    }
    th {
        background-color: {{ farbe_akzent }};
        color: #fff;
    }
    tr:nth-child(even) {
        background-color: #f7f7f7;
    }
</style>
</head>
<body>
    <header class="dokument-kopf">
        {% if logo_data_uri %}<img src="{{ logo_data_uri }}" alt="Logo">{% endif %}
        <span class="organisation">{{ organisation_name }}</span>
    </header>
    {% block inhalt %}{% endblock %}
</body>
</html>
