<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dein Barcode für {{ organisation_name }}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family: Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; max-width:600px; width:100%;">

          <!-- Header -->
          <tr>
            <td style="background-color:{{ farbe_primaer }}; padding:20px 28px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  {% if logo_url %}
                  <td style="width:48px; vertical-align:middle;">
                    <img src="{{ logo_url }}" alt="{{ organisation_name }}" height="40" style="display:block; max-height:40px; max-width:120px; object-fit:contain;">
                  </td>
                  {% endif %}
                  <td style="vertical-align:middle; padding-left:{{ '12px' if logo_url else '0' }};">
                    <span style="color:#ffffff; font-size:16px; font-weight:bold;">{{ organisation_name }}</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Intro -->
          <tr>
            <td style="padding:28px 28px 20px;">
              <h1 style="margin:0 0 8px; font-size:18px; color:{{ farbe_akzent }};">Dein persönlicher Barcode</h1>
              <p style="margin:0 0 6px; font-size:14px; line-height:1.5; color:#1a1a1a;">Hallo <strong>{{ person_name }}</strong>,</p>
              <p style="margin:0; font-size:14px; line-height:1.5; color:#1a1a1a;">{{ intro_text }}</p>
            </td>
          </tr>

          <!-- Barcode-Karte (speicherbar) -->
          <tr>
            <td style="padding:0 28px 28px;">
              <img src="{{ barcode_data_uri }}"
                   alt="Barcode für {{ person_name }}"
                   style="display:block; width:100%; height:auto; border-radius:8px;">
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:16px 28px; border-top:1px solid #eeeeee;">
              <span style="font-size:11px; color:#999999;">Gesendet von Gerätehaus.app im Auftrag von {{ organisation_name }}.</span>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
