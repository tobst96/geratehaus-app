services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geratehaus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-please}
      POSTGRES_DB: ${POSTGRES_DB:-geratehaus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geratehaus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-9112}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
